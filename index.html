<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027학년도 고입전형 중학교 내신성적 산출</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Malgun Gothic', sans-serif; background: #f0f4f8; min-height: 100vh; }
    
    /* 로그인 화면 */
    #loginScreen {
        display: flex; justify-content: center; align-items: center;
        min-height: 100vh; padding: 20px;
    }
    .login-box {
        background: white; border-radius: 16px; padding: 48px 40px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.12); max-width: 420px; width: 100%;
        text-align: center;
    }
    .login-box h1 { color: #1a365d; font-size: 22px; margin-bottom: 8px; }
    .login-box .subtitle { color: #718096; font-size: 13px; margin-bottom: 32px; }
    .login-box .icon { font-size: 48px; margin-bottom: 16px; }
    .login-field { margin-bottom: 16px; text-align: left; }
    .login-field label { display: block; font-size: 13px; font-weight: bold; color: #4a5568; margin-bottom: 6px; }
    .login-field input {
        width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0;
        border-radius: 8px; font-size: 14px; transition: border-color 0.2s;
    }
    .login-field input:focus { outline: none; border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }
    .login-btn {
        width: 100%; padding: 14px; background: #4299e1; color: white;
        border: none; border-radius: 8px; font-size: 15px; font-weight: bold;
        cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    .login-btn:hover { background: #3182ce; }
    .login-error { color: #e53e3e; font-size: 13px; margin-top: 12px; display: none; }
    .login-info { color: #718096; font-size: 11px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
    
    /* 메인 앱 */
    #app { display: none; padding: 20px; }
    
    /* 로그아웃 버튼 */
    .logout-btn {
        position: fixed; top: 16px; right: 20px; z-index: 1000;
        padding: 8px 16px; background: #e53e3e; color: white;
        border: none; border-radius: 6px; font-size: 12px; font-weight: bold;
        cursor: pointer;
    }
    .logout-btn:hover { background: #c53030; }
    .user-info {
        position: fixed; top: 16px; right: 120px; z-index: 1000;
        font-size: 12px; color: #4a5568; background: white;
        padding: 8px 14px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen">
    <div class="login-box">
        <div class="icon">&#128274;</div>
        <h1>내신성적 산출 시스템</h1>
        <p class="subtitle">2027학년도 고입전형 | 부산광역시교육청</p>
        
        <div class="login-field">
            <label>담당자 이름</label>
            <input type="text" id="loginName" placeholder="예: 권정화" autocomplete="off">
        </div>
        <div class="login-field">
            <label>인증 비밀번호</label>
            <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요" autocomplete="off">
        </div>
        
        <button class="login-btn" onclick="doLogin()">로그인</button>
        <p class="login-error" id="loginError">비밀번호가 올바르지 않습니다.</p>
        <p class="login-info">&#8251; 인증된 담임교사만 접근할 수 있습니다.<br>비밀번호 문의: 고입업무 담당자</p>
    </div>
</div>

<!-- 메인 앱 -->
<div id="app"></div>
<span class="user-info" id="userInfo" style="display:none;"></span>
<button class="logout-btn" id="logoutBtn" style="display:none;" onclick="doLogout()">로그아웃</button>

<script src="auth.js"></script>
<script src="grade_calculator.js"></script>
</body>
</html>
